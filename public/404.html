<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // SPA redirect trick for GitHub Pages.
      // When a route like /about is requested, GH Pages serves this 404.html.
      // We store the full URL in sessionStorage and redirect to the root,
      // where index.html picks it up and replaces the history entry.
      var l = window.location;
      sessionStorage.redirect = l.href;
      l.replace(l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") + l.pathname.split("/")[0]);
    </script>
  </head>
  <body></body>
</html>
